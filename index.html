<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademik Arşiv 🦝</title>
    <style>
        :root {
            --bg: #0d1117; /* Daha derin dark mode */
            --card-bg: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --border: #30363d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center; /* İçeriği ortala */
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px; /* Çok yayılmasını engeller, derli toplu tutar */
        }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 1.4rem; margin-bottom: 5px; }
        header p { font-size: 0.85rem; opacity: 0.6; }
        
        /* Sınıf Butonları - Daha kibar ve ince */
        .year-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .year-btn {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .year-btn.active {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
        }

        /* Dönem ve Ders Yapısı */
        .year-content { display: none; }
        .year-content.active { display: block; animation: fadeIn 0.4s ease; }

        .semester-title {
            color: var(--accent);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 25px 0 10px 5px;
            opacity: 0.8;
        }

        .course-list { display: flex; flex-direction: column; gap: 8px; }

        .course-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .course-item:hover { border-color: #8b949e; }

        .course-item span { font-size: 0.9rem; font-weight: 400; }

        .links a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.75rem;
            margin-left: 8px;
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 4px;
            background: #21262d;
        }

        .links a:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <h1>Racoon 🦝</h1>
        <p>Bilgisayar Mühendisliği Ders Arşivi</p>
    </header>

    <div class="year-nav">
        <button class="year-btn active" onclick="showYear('year1', this)">1. Sınıf</button>
        <button class="year-btn" onclick="showYear('year2', this)">2. Sınıf</button>
        <button class="year-btn" onclick="showYear('year3', this)">3. Sınıf</button>
        <button class="year-btn" onclick="showYear('year4', this)">4. Sınıf</button>
    </div>

    <div id="year1" class="year-content active">
        <div class="semester-title">🍂 Güz Dönemi</div>
        <div class="course-list">
            <div class="course-item"><span>Matematik I</span> <div class="links"><a href="#">Notlar</a></div></div>
            <div class="course-item"><span>Fizik I</span> <div class="links"><a href="#">Sorular</a></div></div>
        </div>
        <div class="semester-title">🌸 Bahar Dönemi</div>
        <div class="course-list">
            <div class="course-item"><span>Matematik II</span> <div class="links"><a href="#">Notlar</a></div></div>
        </div>
    </div>

    <div id="year2" class="year-content">
        <div class="semester-title">🍂 Güz Dönemi</div>
        <div class="course-list">
            <div class="course-item"><span>Veri Yapıları</span> <div class="links"><a href="#">Kodlar</a></div></div>
            <div class="course-item"><span>Ayrık Matematik</span> <div class="links"><a href="#">Not</a></div></div>
        </div>
        <div class="semester-title">🌸 Bahar Dönemi</div>
        <div class="course-list">
            <div class="course-item"><span>Diferansiyel Denklemler</span> <div class="links"><a href="#">Notlar</a></div></div>
        </div>
    </div>
</div>

<script>
    function showYear(yearId, btn) {
        document.querySelectorAll('.year-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.year-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(yearId).classList.add('active');
        btn.classList.add('active');
    }
</script>

</body>
</html>
