<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademik Arşiv 🦝</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 30px; }
        
        /* Sınıf Butonları */
        .year-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .year-btn {
            background: var(--card-bg);
            border: 2px solid transparent;
            color: white;
            padding: 15px 5px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .year-btn.active {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
        }

        /* Dönem ve Ders Yapısı */
        .year-content { display: none; }
        .year-content.active { display: block; animation: fadeIn 0.5s; }

        .semester-title {
            color: var(--accent);
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
            margin: 20px 0 15px;
            font-size: 1.1rem;
        }

        .course-list { display: grid; gap: 10px; }

        .course-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
            margin-left: 10px;
            border: 1px solid var(--accent);
            padding: 4px 8px;
            border-radius: 5px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1>Racoon 🦝</h1>
    <p>Bilgisayar Mühendisliği Ders Arşivi</p>
</header>

<div class="year-nav">
    <button class="year-btn active" onclick="showYear('year1', this)">1. Sınıf</button>
    <button class="year-btn" onclick="showYear('year2', this)">2. Sınıf</button>
    <button class="year-btn" onclick="showYear('year3', this)">3. Sınıf</button>
    <button class="year-btn" onclick="showYear('year4', this)">4. Sınıf</button>
</div>

<div id="year1" class="year-content active">
    <div class="semester-title">🍂 Güz Dönemi (1. Yarıyıl)</div>
    <div class="course-list">
        <div class="course-item"><span>Matematik I</span> <div class="links"><a href="#">Notlar</a></div></div>
        <div class="course-item"><span>Fizik I</span> <div class="links"><a href="#">Sorular</a></div></div>
    </div>
    <div class="semester-title">🌸 Bahar Dönemi (2. Yarıyıl)</div>
    <div class="course-list">
        <div class="course-item"><span>Matematik II</span> <div class="links"><a href="#">Notlar</a></div></div>
    </div>
</div>

<div id="year2" class="year-content">
    <div class="semester-title">🍂 Güz Dönemi (3. Yarıyıl)</div>
    <div class="course-list">
        <div class="course-item"><span>Veri Yapıları</span> <div class="links"><a href="#">Kodlar</a></div></div>
        <div class="course-item"><span>Ayrık Matematik</span> <div class="links"><a href="#">Not</a></div></div>
    </div>
    <div class="semester-title">🌸 Bahar Dönemi (4. Yarıyıl)</div>
    <div class="course-list">
        <div class="course-item"><span>Diferansiyel Denklemler</span> <div class="links"><a href="#">Java</a></div></div>
    </div>
</div>

<script>
    function showYear(yearId, btn) {
        // Tüm içerikleri gizle
        document.querySelectorAll('.year-content').forEach(el => el.classList.remove('active'));
        // Tüm butonların aktifliğini kaldır
        document.querySelectorAll('.year-btn').forEach(el => el.classList.remove('active'));
        
        // Seçileni göster
        document.getElementById(yearId).classList.add('active');
        btn.classList.add('active');
    }
</script>

</body>
</html>
