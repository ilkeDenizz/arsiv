<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ders Yönetim Paneli | İlke</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #bb86fc;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--card-bg);
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .course-grid {
            display: grid;
            gap: 15px;
        }

        .course-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-left: 5px solid var(--accent);
        }

        .course-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .link-btn {
            background: #333;
            color: var(--accent);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .link-btn:hover {
            background: var(--accent);
            color: #121212;
        }

        .badge {
            font-size: 0.7rem;
            background: #444;
            padding: 2px 8px;
            border-radius: 10px;
            float: right;
        }
    </style>
</head>
<body>

<header>
    <h1>Racoon Dev 🦝</h1>
    <p>Bilgisayar Mühendisliği Not Arşivi</p>
</header>

<input type="text" class="search-box" id="searchInput" onkeyup="filterCourses()" placeholder="Ders adı ara...">

<div class="course-grid" id="courseContainer">
    <div class="course-card">
        <span class="badge">2. Sınıf</span>
        <span class="course-title">Diferansiyel Denklemler</span>
        <div class="links">
            <a href="#" class="link-btn">📌 Ders Notları</a>
            
            <a href="#" class="link-btn">❓ Çıkmış Sorular</a>
        </div>
    </div>

    <div class="course-card">
        <span class="badge">2. Dönem</span>
        <span class="course-title">Java Programlama</span>
        <div class="links">
            <a href="#" class="link-btn">📄 Java Temelleri PDF</a>
            <a href="https://github.com/ilkedenizz" class="link-btn">🚀 Lablar</a>
        </div>
    </div>

    <div class="course-card">
        <span class="badge">Zorunlu</span>
        <span class="course-title">Devre Temelleri</span>
        <div class="links">
            <a href="#" class="link-btn">📉 Ders Not</a>
            <a href="#" class="link-btn">📖 Çıkmışlar</a>
        </div>
    </div>
</div>

<script>
    function filterCourses() {
        let input = document.getElementById('searchInput').value.toUpperCase();
        let cards = document.getElementsByClassName('course-card');
        
        for (let i = 0; i < cards.length; i++) {
            let title = cards[i].getElementsByClassName('course-title')[0];
            if (title.innerText.toUpperCase().indexOf(input) > -1) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }
</script>

</body>
</html>
