<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racoon Explorer 🦝</title>
    <style>
        :root {
            --main-bg: #0d0d0f;
            --glass: rgba(30, 30, 40, 0.7);
            --accent: #a29bfe;
            --accent-2: #81ecec;
            --text: #f1f2f6;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--main-bg);
            background-image: radial-gradient(circle at 50% -20%, #302b63 0%, #0d0d0f 80%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 450px; }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 1.5rem; margin: 0; color: var(--accent); }

        /* Sınıf Navigasyonu */
        .year-nav {
            display: flex; gap: 5px; background: var(--glass);
            padding: 5px; border-radius: 10px; border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .year-btn {
            flex: 1; background: transparent; border: none; color: #777;
            padding: 8px 0; border-radius: 6px; cursor: pointer;
            font-size: 0.75rem; font-weight: 600; transition: 0.3s;
        }

        .year-btn.active { background: rgba(162, 155, 254, 0.2); color: var(--accent); }

        /* Ders Kartları */
        .course-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 15px; margin-bottom: 10px;
        }

        .course-name { font-size: 0.9rem; margin-bottom: 12px; font-weight: 500; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .folder-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            color: var(--text); padding: 8px; border-radius: 6px;
            font-size: 0.7rem; cursor: pointer; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }

        .folder-btn:hover { background: rgba(255, 255, 255, 0.1); }

        /* MODAL (Dosya Gezgini Görünümü) */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px); z-index: 100;
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: #1c1c24; width: 85%; max-width: 350px;
            border-radius: 15px; border: 1px solid var(--border);
            padding: 20px; position: relative;
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .modal-title { font-size: 0.85rem; color: var(--accent-2); font-weight: bold; }

        .file-list { display: flex; flex-direction: column; gap: 10px; }

        .file-item {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: #ccc; font-size: 0.8rem;
            padding: 8px; border-radius: 5px; background: rgba(255,255,255,0.03);
        }

        .file-item:hover { background: rgba(255,255,255,0.08); color: white; }

        .close-modal { cursor: pointer; font-size: 1.2rem; color: #ff7675; }

        .year-section { display: none; }
        .year-section.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Racoon Explorer 🦝</h1>
        <p>Bilgisayar Mühendisliği Dosya Sistemi</p>
    </header>

    <nav class="year-nav">
        <button class="year-btn active" onclick="switchYear('y1', this)">1. Sınıf</button>
        <button class="year-btn" onclick="switchYear('y2', this)">2. Sınıf</button>
        <button class="year-btn" onclick="switchYear('y3', this)">3. Sınıf</button>
        <button class="year-btn" onclick="switchYear('y4', this)">4. Sınıf</button>
    </nav>

    <div id="y1" class="year-section active">
        <div class="course-card">
            <div class="course-name">Matematik I</div>
            <div class="btn-row">
                <button class="folder-btn" onclick="openFolder('Mat I - Notlar', ['Limit_Notlar.pdf', 'Turev_Ozeti.docx'])">📂 Notlar</button>
                <button class="folder-btn" onclick="openFolder('Mat I - Çıkmış', ['2023_Vize.pdf', 'Final_Sorulari.pdf'])">📝 Sorular</button>
            </div>
        </div>
    </div>

    <div id="y2" class="year-section">
        <div class="course-card">
            <div class="course-name">Veri Yapıları</div>
            <div class="btn-row">
                <button class="folder-btn" onclick="openFolder('Veri Yapıları - Notlar', ['LinkedList.pdf', 'Trees.pdf'])">📂 Notlar</button>
                <button class="folder-btn" onclick="openFolder('Veri Yapıları - Çıkmış', ['Vize_2024.pdf'])">📝 Sorular</button>
            </div>
        </div>
    </div>
</div>

<div id="fileModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="folderTitle" class="modal-title">Klasör İçeriği</span>
            <span class="close-modal" onclick="closeModal()">&times;</span>
        </div>
        <div id="fileList" class="file-list">
            </div>
    </div>
</div>

<script>
    function switchYear(id, btn) {
        document.querySelectorAll('.year-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function openFolder(title, files) {
        const modal = document.getElementById('fileModal');
        const list = document.getElementById('fileList');
        document.getElementById('folderTitle').innerText = title;
        
        list.innerHTML = ''; 
        files.forEach(file => {
            list.innerHTML += `<a href="#" class="file-item">📄 ${file}</a>`;
        });

        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('fileModal').style.display = 'none';
    }

    // Modal dışına tıklayınca kapat
    window.onclick = function(event) {
        if (event.target == document.getElementById('fileModal')) closeModal();
    }
</script>

</body>
</html>
